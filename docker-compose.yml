version: "3.8"

services:
  openforge:
    build: .
    image: openforge/openforge:latest
    ports:
      - "9090:9090"
    volumes:
      - ./models:/home/openforge/models
      - ./data:/home/openforge/data
      - ./config.yaml:/home/openforge/config.yaml:ro
#    devices:
#      - /dev/dri:/dev/dri
    environment:
      - OPENFORGE_HOST=0.0.0.0
      - OPENFORGE_MODEL_PATH=/home/openforge/models
      - OPENFORGE_DEVICE=auto
      - OPENFORGE_LOG_LEVEL=info
    restart: unless-stopped
