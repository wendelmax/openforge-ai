version: "3.8"

services:
  openforge:
    build: .
    image: openforge/openforge:latest
    ports:
      - "9090:9090"
    volumes:
      - ./models:/home/openforge/models
      - ./data:/home/openforge/data
      - ./config.yaml:/home/openforge/config.yaml:ro
    devices:
      - /dev/dri:/dev/dri
    environment:
      - OPENFORGE_SERVER_HOST=0.0.0.0
      - OPENFORGE_MODELS_PATH=/home/openforge/models
      - OPENFORGE_MODELS_DEVICE=auto
      - OPENFORGE_LOGGING_LEVEL=info
    restart: unless-stopped
